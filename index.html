    <script>
      /*

       *

       *     url:  "https://your-url.com",
       *     desc: "One or two sentences about what it does.",
       *     tags: ["Tag1", "Tag2", "Tag3"],
       *     category: "freelance"
       *   },
       *
       * 3. Save the file. Done — the page builds itself.
       *
       * Available categories: freelance | react | 50d50p | fcc
       * To add a new category: add an entry to the CATEGORIES array
       * below, then use that new id as the category on your projects.
       * ============================================================
       */

        {

        {

        },
        {
          name: 'TeaTimeAnyTime',
          url: 'https://www.teatimesanytime.com/',

        },

        // ── REACT ──────────────────────────────────────────────────
        {
          name: 'Assembly: End Game',

          desc: 'A word-guessing game where wrong answers eliminate programming languages — save them all before Assembly is left.',

        },
        {
          name: 'Chef Claude',

          tags: ['React', 'Anthropic API', 'AI', 'Vite'],
          category: 'react',
        },
        {
          name: 'Meme Generator',

          desc: 'Pulls a random image from the Imgflip API and lets you overlay custom top and bottom text.',

        },
        {
          name: 'Tenzies',
          url: 'https://tenzies-six-orcin.vercel.app/',
          desc: 'Roll dice and freeze matching values until all ten dice show the same face — classic Tenzies game.',
          tags: ['React', 'useState', 'Game Logic'],
          category: 'react',
        },

        // ── 50 DAYS 50 PROJECTS ────────────────────────────────────
        {
          name: '50 Days · 50 Projects',
          url: 'https://mudassirudd.github.io/50d-50p/',
          desc: 'A challenge collection of 50 small HTML/CSS/JS projects built over 50 days to sharpen front-end fundamentals.',

          url: 'fcc-html-css/rpg-creature-search/index.html',
          desc: 'Search a custom creature database and display detailed stats for any matching entry.',
          tags: ['HTML', 'CSS', 'Vanilla JS', 'Fetch API'],
          category: 'fcc',
        },
      ]

      // Controls display order and section headings.
      // Change label here to rename a section. Reorder entries to reorder sections.
      const CATEGORIES = [
        { id: 'freelance', label: 'Freelance' },
        { id: 'react', label: 'React' },
        { id: '50d50p', label: '50 Days · 50 Projects' },
        { id: 'fcc', label: 'freeCodeCamp DSA Projects' },
      ]

      // Reads PROJECTS and builds all HTML automatically. No need to touch this.
      function renderProjects() {
        const grid = document.getElementById('projects-grid')
        if (!grid) return

        CATEGORIES.forEach(({ id, label }) => {
          const items = PROJECTS.filter((p) => p.category === id)
          if (items.length === 0) return

          const group = document.createElement('div')
          group.className = 'category-group'

          const heading = document.createElement('h2')
          heading.className = 'category-title'
          heading.textContent = label
          group.appendChild(heading)

          const ul = document.createElement('ul')
          ul.className = 'tiles-list'

          items.forEach((project) => {
            const tagsHTML = project.tags
              .map((t) => `<span class="tag">${t}</span>`)
              .join('')

            const isExternal = project.url.startsWith('http')
            const targetAttr = isExternal
              ? 'target="_blank" rel="noopener noreferrer"'
              : ''

            const li = document.createElement('li')
            li.className = 'tile-item'
            li.innerHTML = `
              <a class="project-tile" href="${project.url}" ${targetAttr}>
                <div class="tile-content">
                  <span class="tile-name">${project.name}</span>
                  <p class="tile-desc">${project.desc}</p>
                  <div class="tile-tags">${tagsHTML}</div>
                </div>
                <span class="tile-arrow">»</span>
              </a>`
            ul.appendChild(li)
          })

          group.appendChild(ul)
          grid.appendChild(group)
        })
      }

      renderProjects()
    </script>
